openapi: 3.0.3
info:
  title: Vidify API
  version: 1.0.0
  description: Vidify Authentication & Video Publishing Platform Backend API
paths:
  /api/auth/forgot-password:
    post:
      operationId: auth_forgot_password_create
      description: Find user, generate secure signed token, and simulate email delivery.
      summary: Forgot password request
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
  /api/auth/google:
    post:
      operationId: auth_google_create
      description: Verify auth code and log in / register Google User.
      summary: Google OAuth Callback Exchange
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuth'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleAuth'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleAuth'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
  /api/auth/login:
    post:
      operationId: auth_login_create
      description: Custom Login View returning camelCase tokens and user profile.
      summary: Login with email and password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
  /api/auth/logout:
    post:
      operationId: auth_logout_create
      description: Handle logout (accepts optional refresh token for simplejwt blacklisting).
      summary: Logout User
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
  /api/auth/me:
    get:
      operationId: auth_me_retrieve
      description: View to retrieve or update the authenticated user's profile.
      summary: Get current user details
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_me_update
      description: View to retrieve or update the authenticated user's profile.
      summary: Update current user details
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: View to retrieve or update the authenticated user's profile.
      summary: Partially update current user details
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUser'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/refresh:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register:
    post:
      operationId: auth_register_create
      description: Handle user registration and generate tokens.
      summary: Register a new user
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
  /api/auth/reset-password:
    post:
      operationId: auth_reset_password_create
      description: Unsign and verify the token, then set user's password.
      summary: Reset password using token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPassword'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
components:
  schemas:
    AuthResponse:
      type: object
      description: Schema for authentication responses containing tokens and user
        profile.
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - accessToken
      - refreshToken
      - user
    CustomTokenObtainPair:
      type: object
      description: Custom Token Obtain Pair Serializer that adds user profile to the
        response.
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    ForgotPassword:
      type: object
      description: Serializer for password reset request.
      properties:
        email:
          type: string
          format: email
      required:
      - email
    GoogleAuth:
      type: object
      description: Serializer for Google OAuth 2.0 exchange.
      properties:
        code:
          type: string
      required:
      - code
    Message:
      type: object
      description: Schema for generic API message responses.
      properties:
        message:
          type: string
      required:
      - message
    PatchedUser:
      type: object
      description: Serializer representing the user profile in camelCase format.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        googleId:
          type: string
          nullable: true
        plan:
          allOf:
          - $ref: '#/components/schemas/PlanEnum'
          readOnly: true
        creditsTotal:
          type: integer
          readOnly: true
        creditsUsed:
          type: integer
          readOnly: true
        creditsRemaining:
          type: integer
          readOnly: true
        creditsResetAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        onboardingCompleted:
          type: boolean
          default: false
        brandKit:
          type: object
          additionalProperties: {}
          readOnly: true
    PlanEnum:
      enum:
      - free
      - starter
      - pro
      - agency
      type: string
      description: |-
        * `free` - Free
        * `starter` - Starter
        * `pro` - Pro
        * `agency` - Agency
    Register:
      type: object
      description: Serializer for registering a new user with 5 free credits.
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
        firstName:
          type: string
        lastName:
          type: string
      required:
      - email
      - firstName
      - lastName
      - password
    ResetPassword:
      type: object
      description: Serializer for resetting password using a secure token.
      properties:
        token:
          type: string
        newPassword:
          type: string
          writeOnly: true
      required:
      - newPassword
      - token
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      description: Serializer representing the user profile in camelCase format.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        googleId:
          type: string
          nullable: true
        plan:
          allOf:
          - $ref: '#/components/schemas/PlanEnum'
          readOnly: true
        creditsTotal:
          type: integer
          readOnly: true
        creditsUsed:
          type: integer
          readOnly: true
        creditsRemaining:
          type: integer
          readOnly: true
        creditsResetAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        onboardingCompleted:
          type: boolean
          default: false
        brandKit:
          type: object
          additionalProperties: {}
          readOnly: true
      required:
      - brandKit
      - creditsRemaining
      - creditsResetAt
      - creditsTotal
      - creditsUsed
      - email
      - id
      - plan
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
